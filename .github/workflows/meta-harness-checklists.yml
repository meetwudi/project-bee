name: Meta Harness Checks

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify library definitions
        run: |
          python3 meta-harness/tools/check-library-definitions

      - name: Verify task definitions
        run: |
          python3 meta-harness/tools/check-task-definitions

      - name: Verify skill definitions
        run: |
          python3 meta-harness/tools/check-skill-definitions

      - name: Verify project harness compliance
        run: |
          python3 meta-harness/tools/check-project-harness-compliance

      - name: Verify harness file metadata
        run: |
          python3 meta-harness/tools/check-harness-file-metadata

      - name: Collect PR changes and attestations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --name-only --diff-filter=ACMR "$BASE_SHA...$HEAD_SHA" > /tmp/meta-harness-changed-files.txt
          git log --format=%B "$BASE_SHA..$HEAD_SHA" > /tmp/meta-harness-attestations.txt

      - name: Verify checklist attestations
        run: |
          python3 meta-harness/tools/check-checklist-attestations \
            --changed-files /tmp/meta-harness-changed-files.txt \
            --attestations /tmp/meta-harness-attestations.txt
